<!DOCTYPE html>
<html lang="en">
<head> 
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    overflow-x:hidden;
}

.video-container {
    position: relative;
    width: 100%;
    height: 100vh; /* Full-screen video */
    overflow: hidden;
}

.video-placeholder {
        position: absolute;
        inset: 0;
        background-image: url('images/loading.jpg');
        background-size: cover;
        background-position: center;
        filter: blur(20px);
        transform: scale(1.1); /* prevents blur edge artifacts */
        transition: opacity 0.5s ease;
        z-index: 1;
    }

  .video-placeholder.hidden {
        opacity: 0;
        pointer-events: none;
    }

 /* ---------- Loader ---------- */

    /* Loader overlay */
.loader-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    transition: opacity 0.6s ease;
}

/* ---------- LOADING BAR ---------- */

.progress {
    width: 240px;
    height: 4px;
    background: rgba(255,255,255,.2);
    border-radius: 999px;
    overflow: hidden;
}

.progress-fill {
    width: 0%;
    height: 100%;
    background: white;
    transition: width .2s linear;
}

/* ---------- SCROLL DOWN ---------- */

.scroll-arrow {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    
    display: flex;
    align-items: center;
    justify-content: center;


    width: 70px;
    height: 40px;
    border: none;
    border-radius: 30px;
    
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 40px;
    cursor: pointer;
    
    backdrop-filter: blur(5px);
    transition: all 0.3s ease;
}

.scroll-arrow:hover {
    background: rgba(255,255,255,0.35);
    transform: translateX(-50%) scale(1.1);
}

.scroll-arrow span {
    transform: translateY(-8px); 
}

.scroll-arrow2018 {
    
    float: left;
    margin-left: 20%;
    margin-bottom: -4%;
    position: relative;
    width: 12%;
    aspect-ratio: 2 / 1;
    transform: translateY(-112%);
    border: none;
       
    color: white;
    cursor: pointer;
    opacity: 0;
}

/* ---------- HERO VIDEO ---------- */

.hero{
    width:100%;
    height:100vh;
}

.hero video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* ---------- POINTER 2018 ---------- */

#vid2018 {
    cursor: url("images/reload.png") 4 12, auto;
}

/* ---------- GALLERY ---------- */

.gallery{
    padding:8px;
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:8px;
}

/* ---------- YOUTUBE ---------- */

.youtube{
    padding-inline:20%;
    padding-block:6px;
}

/* ---------- SPOTIFY ---------- */

.spotify{
    padding-inline:20%;
    padding-block:2%;
}

/* Mobile */
@media (max-width:768px){
    .gallery{
        grid-template-columns:1fr;
        gap:6px;
        padding:6px;
    }

    .spotify{
        padding-inline:5%;
        padding-block:5%;
    }

    .youtube{
        padding-inline:5%;
    }
}

/* ---------- IMAGES ---------- */

.image-wrapper{
    overflow:hidden;
}

.image-wrapper img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;

    opacity:0;
    transform:translateY(40px);

    transition:
        opacity 1s ease,
        transform 1s ease;
}

/* Visible state */

.image-wrapper.visible img{
    opacity:1;
    transform:translateY(0);
}

/* Youtube video */

.video-container-youtube{
  position: relative;
  margin-top: 10px;
  padding-bottom: 56.25%; /* 16:9 */
  height: 0;
}
.video-container-youtube iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

</style>
</head>
<body>

<!-- FULLSCREEN VIDEO -->

<section class="hero">

    <div class="video-placeholder" id="placeholder"></div>

    <div class="progress">
    <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <video id="heroVideo" autoplay muted playsinline loop preload="auto">
        <source src="videos/main.mp4" type="video/mp4">
    </video>

    <button class="scroll-arrow" onclick="scrollPastVideo()">
        <span>&#128899;</span>
    </button>

</section>

<!-- IMAGE GALLERY -->

<section class="gallery">

    <div class="image-wrapper">
        <img src="images/image1.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image2.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image3.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image4.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image5.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image6.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image7.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image8.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image9.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image10.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image11.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image12.jpg" loading="lazy" alt="">
    </div>
</section>

<!-- 2018 VIDEO -->

<section>

    <video
        width="100%"
        height="100%"
        object-fit="contain"
        display="block"
        id="vid2018"
        autoplay
        muted
        playsinline
        onclick="replayVideo()"
        <source src="videos/2018.mp4" type="video/mp4" loading="lazy">

    </video>

    <button class="scroll-arrow2018" onclick="scrollIntoView()">
    </button>
</section>

<section class="youtube">
    <div id="youtube" class="video-container-youtube">
        <iframe  
         src="https://www.youtube-nocookie.com/embed/imHyyPFjh9E?si=gLugXcSY16lvcIfR&showinfo=0"
         title="YouTube video player"
         frameborder="0" allow="accelerometer;autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
         referrerpolicy="strict-origin-when-cross-origin"
         allowfullscreen>
         </iframe>
    </div>
</section>

<!-- spotify -->

<section class="spotify">
    <iframe
    data-testid="embed-iframe"
    style="border-radius:12px"
    src="https://open.spotify.com/embed/artist/3m5HTbYnpREIh9kdEcHlPf?utm_source=generator&si=570ca639ec8743ec"
    width="100%"
    height="352"
    frameBorder="0"
    allowfullscreen=""
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
    loading="lazy">
    </iframe>
</section>

<script>

/* FADE-IN ON SCROLL */

const images = document.querySelectorAll('.image-wrapper');

const observer = new IntersectionObserver((entries)=>{

    entries.forEach(entry=>{

        if(entry.isIntersecting){

            entry.target.classList.add('visible');

        }

    });

},{
    threshold:0.15
});

images.forEach(image=>{
    observer.observe(image);
});

function replayVideo() {
  var video = document.getElementById("vid2018");
  video.currentTime = 0; // Rewind to start
  video.play();          // Start playing
}

/* SCROLL */

function scrollPastVideo() {
    const videoSection = document.getElementById('heroVideo');

    window.scrollTo({
        top: 1000,
        behavior: 'smooth'
    });
}

function scrollToVideo() {
    document.getElementById('youtube').scrollIntoView({
        behavior: 'smooth',
        block: 'start'
    });
}

const videoload = document.getElementById('heroVideo');
    const placeholder = document.getElementById('placeholder');

    // Hide placeholder when playback actually starts
    videoload.addEventListener('playing', () => {
        placeholder.classList.add('hidden');
    });

    // Fallback in case video is already ready
    videoload.addEventListener('canplay', () => {
        videoload.play().catch(() => {});
    });

const fill = document.getElementById('progressFill');

heroVideo.addEventListener('progress', () => {
    if (video.buffered.length > 0) {
        const percent =
            (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;

        fill.style.width = Math.min(percent, 100) + '%';
    }
});

</script>

</body>
</html>
