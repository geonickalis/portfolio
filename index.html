<head>

<meta charset="UTF-8">

<title>Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    overflow-x:hidden;
}

canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: -1;
}

#bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  z-index: -1;
  }

.bubbles {
  position: relative;
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: #ffffff00;
}

.video-container {
    position: relative;
    width: 100%;
    height: 100vh; /* Full-screen video */
    overflow: hidden;
}

.video-placeholder {
        position: absolute;
        inset: 0;
        background-image: url('images/loading.jpg');
        background-size: cover;
        background-position: center;
        filter: blur(20px);
        transform: scale(1.1); /* prevents blur edge artifacts */
        transition: opacity 0.5s ease;
        z-index: 1;
    }

  .video-placeholder.hidden {
        opacity: 0;
        pointer-events: none;
    }

 /* ---------- Loader ---------- */

    /* Loader overlay */
.loader-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    transition: opacity 0.6s ease;
}


/* ---------- SCROLL DOWN ---------- */

.scroll-arrow {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    
    display: flex;
    align-items: center;
    justify-content: center;

    width: 70px;
    height: 40px;
    border: none;
    border-radius: 30px;
    
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 40px;
    cursor: pointer;
    
    backdrop-filter: blur(5px);
    transition: all 0.3s ease;
}

.scroll-arrow:hover {
    background: rgba(255,255,255,0.35);
    transform: translateX(-50%) scale(1.1);
}

.scroll-arrow span {
    transform: translateY(-8px); 
}

.scroll-arrow2018 {
    
    float: left;
    margin-left: 20%;
    margin-bottom: -4%;
    position: relative;
    width: 12%;
    aspect-ratio: 2 / 1;
    transform: translateY(-112%);
    border: none;
       
    color: white;
    cursor: pointer;
    opacity: 0;
}

/* ---------- HERO VIDEO ---------- */

.hero{
    width:100%;
    height:100vh;
}

.hero video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* ---------- POINTER 2018 ---------- */

#vid2018 {
    cursor: url("images/reload.png"), auto;
}

/* ---------- GALLERY ---------- */

.gallery{
    padding:8px;
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:8px;
}

/* ---------- YOUTUBE ---------- */

.youtube{
    padding-inline:20%;
    padding-block:6px;
}

/* ---------- SPOTIFY ---------- */

.spotify{
    padding-inline:20%;
    padding-block:2%;
}

/* Mobile */
@media (max-width:768px){
    .gallery{
        grid-template-columns:1fr;
        gap:6px;
        padding:6px;
    }

    .spotify{
        padding-inline:5%;
        padding-block:5%;
    }

    .youtube{
        padding-inline:5%;
    }

    .scroll-arrow{
    display: none;
  }
}

/* ---------- IMAGES ---------- */

.image-wrapper{
    overflow:hidden;
}

.image-wrapper img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;

    opacity:0;
    transform:translateY(40px);

    transition:
        opacity 1s ease,
        transform 1s ease;
}

/* Visible state */

.image-wrapper.visible img{
    opacity:1;
    transform:translateY(0);
}

/* Youtube video */

.video-container-youtube{
  position: relative;
  margin-top: 10px;
  padding-bottom: 56.25%; /* 16:9 */
  height: 0;
}
.video-container-youtube iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}


</style>
</head>
<body>

    <video id="heroVideo" autoplay muted playsinline loop preload="auto">

</section>

<section class="gallery">

    <div class="image-wrapper">
        <img src="images/image5.jpg" loading="lazy" alt="">

    <div class="image-wrapper">

    <div class="image-wrapper">

<!-- 2018 VIDEO -->

<section>
    
    <video
        width="100%"
        height="100%"
        object-fit="contain"
        display="block"
        id="vid2018"
        autoplay
        muted
        playsinline
        onclick="replayVideo()"
        <source src="videos/2018.mp4" type="video/mp4" loading="lazy">

    </video>

    <button class="scroll-arrow2018" onclick="scrollIntoView()">
    </button>
</section>

<section class="bubbles">
  
   <canvas id="bg"></canvas>
     <!-- youtube -->
   

    <div class="youtube">
        <div id="youtube" class="video-container-youtube">
            <iframe  
             src="https://www.youtube-nocookie.com/embed/imHyyPFjh9E?si=gLugXcSY16lvcIfR&showinfo=0"
             title="YouTube video player"
             frameborder="0" allow="accelerometer;autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
             referrerpolicy="strict-origin-when-cross-origin"
             allowfullscreen>
             </iframe>
        </div>
    </div>

    <!-- spotify -->

    <div class="spotify">
        <iframe
        data-testid="embed-iframe"
        style="border-radius:12px"
        src="https://open.spotify.com/embed/artist/3m5HTbYnpREIh9kdEcHlPf?utm_source=generator&si=570ca639ec8743ec"
        width="100%"
        height="352"
        frameBorder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
        </iframe>
    </div>

</section>

<script>

/* FADE-IN ON SCROLL */

const images = document.querySelectorAll('.image-wrapper');

const observer = new IntersectionObserver((entries)=>{

    entries.forEach(entry=>{

        if(entry.isIntersecting){

            entry.target.classList.add('visible');

        }

    });

},{
    threshold:0.15
});

images.forEach(image=>{
    observer.observe(image);
});

function replayVideo() {
  var video = document.getElementById("vid2018");
  video.currentTime = 0; // Rewind to start
  video.play();          // Start playing
}

/* SCROLL */

function scrollPastVideo() {
    const videoSection = document.getElementById('heroVideo');

    window.scrollTo({
        top: 1000,
        behavior: 'smooth'
    });
}

function scrollToVideo() {
    document.getElementById('youtube').scrollIntoView({
        behavior: 'smooth',
        block: 'start'
    });
}

const videoload = document.getElementById('heroVideo');
const placeholder = document.getElementById('placeholder');

    // Hide placeholder when playback actually starts
    videoload.addEventListener('playing', () => {
        placeholder.classList.add('hidden');
    });

    // Fallback in case video is already ready
    videoload.addEventListener('canplay', () => {
        videoload.play().catch(() => {});
    });


const observerVideo = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      videoload.play().catch(() => {});
    } else {
      videoload.pause();
    }
  });
}, {
  threshold: 0.05
});

observerVideo.observe(videoload);


//-----------bubbles----------------

const section = document.querySelector(".bubbles");
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w, h, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;

  const rect = section.getBoundingClientRect();

  w = rect.width;
  h = rect.height;

  canvas.width = w * dpr;
  canvas.height = h * dpr;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

window.addEventListener("resize", resize);
resize();

// Mouse state
const mouse = {
  x: -9999,
  y: -9999
};

section.addEventListener("mousemove", (e) => {
  const rect = section.getBoundingClientRect();

  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

section.addEventListener("mouseleave", () => {
  mouse.x = -9999;
  mouse.y = -9999;
});

section.addEventListener("click", (e) => {
  const rect = section.getBoundingClientRect();

  burst(
    e.clientX - rect.left,
    e.clientY - rect.top
  );
});

// wave field
function wave(x, y, t) {
  return (
    Math.sin(x * 0.01 + t * 0.001) +
    Math.sin(y * 0.01 - t * 0.001) +
    Math.sin((x + y) * 0.008 + t * 0.0015)
  );
}

class Circle {
  constructor() {
    this.reset(true);
  }

  reset(initial = false) {
    this.baseX = Math.random() * w;
    this.baseY = Math.random() * h;
    this.x = this.baseX;
    this.y = this.baseY;
    this.r = .2; //+ Math.random() * 6;

    this.vx = 0;
    this.vy = 0;

    this.alpha = initial ? Math.random() : 0;
  }

  update(t) {
    const n = wave(this.baseX, this.baseY, t);

    const targetX = this.baseX + n * 25;
    const targetY = this.baseY + n * 25;

    // spring back to flow target
    this.vx += (targetX - this.x) * 0.02;
    this.vy += (targetY - this.y) * 0.02;

    // mouse interaction (repel)
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const radius = 100;
    if (dist < radius) {
      const force = (1 - dist / radius) * 4;
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
    }

    // damping
    this.vx *= 0.9;
    this.vy *= 0.9;

    this.x += this.vx;
    this.y += this.vy;

    // fade in
    this.alpha += (0.6 - this.alpha) * 0.02;

    // respawn
    if (this.x < -50 || this.x > w + 50 || this.y < -50 || this.y > h + 50) {
      this.reset();
    }
  }

  draw() {
    ctx.beginPath();
    ctx.fillStyle = `rgba(100, 100, 100, ${this.alpha * 1})`;
    ctx.arc(this.x, this.y, this.r*3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// burst particles on click
const bursts = [];

function burst(x, y) {
  for (let i = 0; i < 18; i++) {
    bursts.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      r: Math.random(),
      life: 60
    });
  }
}

const circles = Array.from({ length: 200 }, () => new Circle());

let start = performance.now();

function animate(now) {
  const t = now - start;

  ctx.fillStyle = "rgba(0, 0, 0, .3)";
  ctx.fillRect(0, 0, w, h);

  for (const c of circles) {
    c.update(t/2);
    c.draw();
  }

  // bursts
  for (let i = bursts.length - 1; i >= 0; i--) {
    const p = bursts[i];

    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life--;

    ctx.beginPath();
    ctx.fillStyle = `rgba(200, 200, 200, ${p.life / 100})`;
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    if (p.life <= 0) bursts.splice(i, 1);
  }

  requestAnimationFrame(animate);
}

animate(performance.now());

</script>

</body>
</html>
