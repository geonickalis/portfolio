<!DOCTYPE html>
<html lang="en">
<head> 
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    overflow-x:hidden;
}

/* ---------- HERO VIDEO ---------- */

.hero{
    width:100%;
    height:100vh;
}

.hero video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* ---------- GALLERY ---------- */

.gallery{
    padding:8px;
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:8px;
}

/* ---------- SPOTIFY ---------- */

.social{
    padding-inline:20%;
    padding-block:2%;
}

/* Mobile */
@media (max-width:768px){
    .gallery{
        grid-template-columns:1fr;
        gap:6px;
        padding:6px;
    }

    .social{
        padding-inline:5%;
        padding-block:5%;
    }
}

/* ---------- IMAGES ---------- */

.image-wrapper{
    overflow:hidden;
}

.image-wrapper img{
    width:100%;
    display:block;
    object-fit:cover;

    opacity:0;
    transform:translateY(40px);

    transition:
        opacity 1s ease,
        transform 1s ease;
}

/* Visible state */

.image-wrapper.visible img{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>
<body>

<!-- FULLSCREEN VIDEO -->

<section class="hero">

    <video id="player" autoplay muted playsinline preload="auto">
        <source rel="preload" as="video" src="videos/video1.mp4" type="video/mp4" loading="eager">
    </video>

</section>

<!-- IMAGE GALLERY -->

<section class="gallery">

    <div class="image-wrapper">
        <img src="images/image1.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image2.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image3.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image4.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image5.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image6.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image7.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image8.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image9.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image10.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image11.jpg" loading="lazy" alt="">
    </div>

    <div class="image-wrapper">
        <img src="images/image12.jpg" loading="lazy" alt="">
    </div>
</section>

<!-- 2018 VIDEO -->

<section>

    <video
        width="100%"
        height="100%"
        object-fit="contain"
        display="block"
        id="2018"
        autoplay
        muted
        playsinline
        onclick="replayVideo()"
        <source src="videos/2018.mp4" type="video/mp4" loading="lazy">

    </video>

</section>

<section class="social">
    <iframe  
     width="100%"
     height="100%"
     src="https://www.youtube-nocookie.com/embed/imHyyPFjh9E?si=gLugXcSY16lvcIfR"
     title="YouTube video player"
     frameborder="0" allow="accelerometer;autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
     referrerpolicy="strict-origin-when-cross-origin"
     allowfullscreen>
    </iframe>
</section>

<!-- spotify -->

<section class="social">
    <iframe
    data-testid="embed-iframe"
    style="border-radius:12px"
    src="https://open.spotify.com/embed/artist/3m5HTbYnpREIh9kdEcHlPf?utm_source=generator&si=570ca639ec8743ec"
    width="100%"
    height="352"
    frameBorder="0"
    allowfullscreen=""
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
    loading="lazy">
    </iframe>
</section>

<script>

/* FADE-IN ON SCROLL */

const images = document.querySelectorAll('.image-wrapper');

const observer = new IntersectionObserver((entries)=>{

    entries.forEach(entry=>{

        if(entry.isIntersecting){

            entry.target.classList.add('visible');

        }

    });

},{
    threshold:0.15
});

images.forEach(image=>{
    observer.observe(image);
});

function replayVideo() {
  var video = document.getElementById("2018");
  video.currentTime = 0; // Rewind to start
  video.play();          // Start playing
}

const videos = [
    "video1.mp4",
    "video2.mp4",
    "video3.mp4"
];

let current = 0;
const player = document.getElementById("player");

player.addEventListener("ended", () => {
    current = (current + 1) % videos.length; // wrap back to start
    player.src = videos[current];
    player.play();
});

const observervid = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            player.play().catch(() => {});
        } else {
            player.pause();
        }
    });
}, {
    threshold: 0.05 
});

observervid.observe(player);

</script>

</body>
</html>
